<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我们的小学毕业纪念</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 稳定的Supabase SDK CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.0/dist/umd/supabase.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#87CEEB',
                        secondary: '#FFB6C1',
                        warm: '#FFF8DC',
                    },
                    fontFamily: {
                        sans: ['Microsoft YaHei', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .grad-bg {
                background: linear-gradient(135deg, #87CEEB 0%, #FFB6C1 100%);
            }
            .card-shadow {
                box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            }
        }
    </style>
</head>
<body class="bg-warm min-h-screen">
    <header class="grad-bg text-white py-8 px-4 text-center">
        <h1 class="text-3xl md:text-4xl font-bold mb-2">🎓 我们毕业啦！</h1>
        <p class="text-lg opacity-90">XX小学XX班 · 永远的童年回忆</p>
    </header>

    <main class="max-w-4xl mx-auto py-10 px-4">
        <!-- 毕业寄语 -->
        <section class="bg-white rounded-2xl p-6 card-shadow mb-10">
            <h2 class="text-xl font-bold text-gray-700 mb-3">✨ 毕业寄语</h2>
            <p class="text-gray-600 leading-7">
                六年的时光匆匆而过，我们从懵懂的小朋友，长成了朝气蓬勃的少年。
                教室里的欢声笑语，操场上的奔跑嬉戏，都是我们最珍贵的回忆。
                愿我们前程似锦，不忘初心，永远是好朋友！❤️
            </p>
        </section>

        <!-- 🔒 密码验证区域（默认显示） -->
        <section id="passwordBox" class="bg-white rounded-2xl p-8 card-shadow mb-10 text-center">
            <h2 class="text-xl font-bold text-gray-700 mb-4">🔒 请输入密码查看留言</h2>
            <div class="max-w-sm mx-auto space-y-4">
                <input type="password" id="viewPassword" placeholder="请输入班级密码" 
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary text-lg">
                <button onclick="checkPassword()" 
                    class="bg-primary hover:bg-blue-400 text-white font-medium py-3 px-6 rounded-lg transition w-full">
                    确认解锁
                </button>
                <p class="text-sm text-gray-500">密码由班级统一提供，仅同学可见</p>
            </div>
        </section>

        <!-- 📝 留言发布区（默认隐藏） -->
        <section id="messageArea" class="hidden bg-white rounded-2xl p-6 card-shadow mb-10">
            <h2 class="text-xl font-bold text-gray-700 mb-4">📝 留下你的祝福</h2>
            <form id="messageForm" class="space-y-4">
                <div>
                    <label class="block text-gray-600 mb-1">你的昵称</label>
                    <input type="text" id="name" required 
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary">
                </div>
                <div>
                    <label class="block text-gray-600 mb-1">留言内容</label>
                    <textarea id="content" rows="3" required 
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary"></textarea>
                </div>
                <button type="submit" 
                    class="bg-primary hover:bg-blue-400 text-white font-medium py-2 px-6 rounded-lg transition">
                    发布留言
                </button>
            </form>
        </section>

        <!-- 💬 留言墙（默认隐藏） -->
        <section id="messageWall" class="hidden bg-white rounded-2xl p-6 card-shadow">
            <h2 class="text-xl font-bold text-gray-700 mb-4">💬 同学们的留言</h2>
            <div id="messageList" class="space-y-4">
                <p class="text-gray-500 text-center">正在加载留言...</p>
            </div>
        </section>
    </main>

    <footer class="text-center text-gray-500 py-6 text-sm">
        💖 纪念我们美好的小学时光 · 2026毕业季
    </footer>

    <script>
        // ====================== 【配置区：仅修改密码即可，URL和密钥已填好】======================
        const SUPABASE_URL = "https://kpxsgamxyahfpobduyvf.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtweHNnYW14eWFoZnBvYmR1eXZmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4MTY2ODgsImV4cCI6MjA4OTM5MjY4OH0.V5qjiqdHwGj2aaeAvuBpyLvmRjLvgGLnDNflX9z7160";
        const UNLOCK_PASSWORD = "liujiatop1";
        // =========================================================================================

        let supabaseClient; // 全局变量，让所有函数都能访问

        // 等待页面和SDK都加载完成后再初始化
        window.addEventListener('DOMContentLoaded', function() {
            console.log("页面加载完成");
            
            // 检查supabase对象是否存在
            if (typeof supabase === 'undefined') {
                console.error("❌ Supabase SDK未加载成功");
                alert("Supabase SDK加载失败，请刷新页面重试！");
                return;
            }

            // 初始化Supabase
            try {
                supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                console.log("✅ Supabase初始化成功");
            } catch (e) {
                console.error("❌ Supabase初始化失败", e);
                alert("初始化失败，请检查控制台报错！");
                return;
            }

            // 绑定留言提交事件
            document.getElementById('messageForm').addEventListener('submit', submitMessage);
        });

        // 🔑 密码验证函数（全局可访问）
        window.checkPassword = function() {
            const inputPwd = document.getElementById('viewPassword').value.trim();
            console.log("输入的密码：", inputPwd);

            if (inputPwd !== UNLOCK_PASSWORD) {
                alert('❌ 密码错误，请重新输入！');
                return;
            }

            // 密码正确：隐藏密码框，显示留言区域
            document.getElementById('passwordBox').classList.add('hidden');
            document.getElementById('messageArea').classList.remove('hidden');
            document.getElementById('messageWall').classList.remove('hidden');
            
            // 加载留言
            loadMessages();
            alert('✅ 密码正确！欢迎查看班级留言墙');
        }

        // 加载留言函数
        async function loadMessages() {
            const messageList = document.getElementById('messageList');
            try {
                console.log("正在获取留言...");
                const { data, error } = await supabaseClient
                    .from('messages')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) throw error;
                console.log("✅ 获取留言成功", data);

                if (data.length === 0) {
                    messageList.innerHTML = '<p class="text-gray-500 text-center">还没有留言，快来写下第一句祝福吧！</p>';
                    return;
                }

                // 渲染留言
                let html = '';
                data.forEach(item => {
                    const time = new Date(item.created_at).toLocaleString();
                    html += `
                        <div class="border-b border-gray-100 pb-3 last:border-0">
                            <div class="flex justify-between items-center mb-1">
                                <span class="font-medium text-primary">${item.name}</span>
                                <span class="text-xs text-gray-400">${time}</span>
                            </div>
                            <p class="text-gray-600">${item.content}</p>
                        </div>
                    `;
                });
                messageList.innerHTML = html;
            } catch (e) {
                console.error("❌ 加载留言失败", e);
                messageList.innerHTML = `<p class="text-red-500 text-center">加载失败：${e.message}</p>`;
            }
        }

        // 提交留言函数
        async function submitMessage(e) {
            e.preventDefault();
            const name = document.getElementById('name').value.trim();
            const content = document.getElementById('content').value.trim();

            try {
                console.log("正在发布留言...");
                const { error } = await supabaseClient
                    .from('messages')
                    .insert([{ name, content }]);

                if (error) throw error;
                console.log("✅ 发布成功");
                alert('✅ 留言发布成功！');
                document.getElementById('messageForm').reset();
                loadMessages(); // 刷新留言列表
            } catch (e) {
                console.error("❌ 发布失败", e);
                alert(`发布失败：${e.message}`);
            }
        }
    </script>
</body>
</html>
